name: Update GitHub Trophies

on:
  schedule:
    - cron: "0 3 * * 0"   # Her Pazar 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Trophy SVG
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          TROPHY_OUTPUT:   profile/trophy.svg
        run: python scripts/generate_trophy.py

      - name: Validate SVG
        run: |
          FILE="profile/trophy.svg"
          [ -f "$FILE" ] || { echo "ERROR: $FILE not found!"; exit 1; }
          grep -q "<svg" "$FILE" || { echo "ERROR: Not a valid SVG!"; cat "$FILE"; exit 1; }
          SIZE=$(wc -c < "$FILE")
          echo "SVG OK — $SIZE bytes"
          [ "$SIZE" -gt 500 ] || { echo "ERROR: SVG too small ($SIZE bytes)"; exit 1; }

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "chore: update GitHub trophies [skip ci]"
          git push
