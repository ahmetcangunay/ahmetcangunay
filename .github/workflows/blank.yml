name: Update GitHub Trophies

on:
  schedule:
    - cron: "0 3 * * 0"   # Her Pazar sabahı 03:00 UTC
  workflow_dispatch:        # Elle de tetiklenebilir

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Trophy SVG
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          TROPHY_OUTPUT:   profile/trophy.svg
        run: python scripts/generate_trophy.py

      - name: Validate SVG
        run: |
          FILE="profile/trophy.svg"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found!" && exit 1
          fi
          if ! grep -q "<svg" "$FILE"; then
            echo "ERROR: $FILE is not a valid SVG!" && cat "$FILE" && exit 1
          fi
          SIZE=$(wc -c < "$FILE")
          echo "SVG OK — $SIZE bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: SVG is suspiciously small ($SIZE bytes)" && exit 1
          fi

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "chore: update GitHub trophies [skip ci]"
          git push
