name: Update GitHub Trophies
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophy SVG
        run: |
          mkdir -p profile
          curl -o profile/trophy.svg \
            "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=radical"

      - name: Commit and Push Trophies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg
          git commit -m "Update GitHub Trophies" || exit 0
          git push
